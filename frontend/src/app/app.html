<app-encabezado 
  (logoClick)="limpiarSeleccion()" 
  (openLogin)="showLoginModal.set(true)"
  (openCrearPersona)="abrirGestion('crear')"
></app-encabezado>

<main style="transition: all 0.4s ease;">
  <ul id="usuarios">
    @for (usuario of usuarios(); track usuario.id) {
      <li>
        <app-usuario
          [seleccionado]="usuario.id === idUsuarioSeleccionado()"
          [usuario]="usuario"
          (seleccion)="alSeleccionarUsuario($event)"
          (editar)="abrirGestion('editar', $event)"
          (eliminar)="abrirGestion('borrar', $event)"
        />
      </li>
    }
  </ul>

  @if (usuarioSeleccionado()) {
    <app-tareas [idUsuario]="usuarioSeleccionado()!.id" [nombre]="usuarioSeleccionado()!.nombre" />
  } @else {
    <div id="textoCondicional" class="empty-state-premium">
      <div class="empty-icon-glow">✨</div>
      <h2 style="font-weight: 300; letter-spacing: 1px;">Selecciona una Misión</h2>
      <p style="opacity: 0.7;">Elige un perfil para gestionar sus tareas asignadas.</p>
    </div>
  }
</main>

<!-- Modal de Gestión Unificado (RF-02, RF-05) -->
<app-gestion-persona 
  *ngIf="showGestionModal()"
  [modo]="modoGestion()"
  [usuario]="usuarioParaGestion()"
  (cerrar)="showGestionModal.set(false)"
  (completado)="cargarUsuarios()"
></app-gestion-persona>

<app-login *ngIf="showLoginModal()" (close)="showLoginModal.set(false)"></app-login>
