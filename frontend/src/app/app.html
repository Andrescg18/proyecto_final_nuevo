<app-encabezado (logoClick)="limpiarSeleccion()" (openLogin)="showLoginModal.set(true)"></app-encabezado>

<main style="transition: all 0.4s ease; backdrop-filter: blur(5px);">
  <ul id="usuarios">
    @for (usuario of usuarios(); track usuario.id) {
      <li>
        <app-usuario
          [seleccionado]="usuario.id === idUsuarioSeleccionado()"
          [usuario]="usuario"
          (seleccion)="alSeleccionarUsuario($event)"
          (usuarioEditado)="cargarUsuarios()"
        />
      </li>
    }
  </ul>

  <div *ngIf="authService.isAdmin()" style="text-align: center; margin-top: 1.5rem; width: 330px; animation: fadeIn 0.8s ease;">
    <button (click)="abrirCrearUsuario()" class="btn-premium">
      ➕ Crear Persona
    </button>
  </div>

  @if (usuarioSeleccionado()) {
    <app-tareas [idUsuario]="usuarioSeleccionado()!.id" [nombre]="usuarioSeleccionado()!.nombre" />
  } @else {
    <div id="textoCondicional" class="empty-state-premium">
      <div class="empty-icon-glow">✨</div>
      <h2 style="font-weight: 300; letter-spacing: 1px;">Selecciona una Misión</h2>
      <p style="opacity: 0.7;">Elige un perfil para gestionar sus tareas asignadas.</p>
    </div>
  }
</main>

<!-- Modal Selección Avatar (RF-05) -->
<div class="modal-overlay-premium" *ngIf="showAvatarModal()" (click)="showAvatarModal.set(false)">
  <div class="modal-content-premium" (click)="$event.stopPropagation()">
    <h2>Selecciona un Avatar</h2>
    <p>Elige la imagen de perfil para <strong>{{ nuevoNombreTmp }}</strong></p>
    <div class="avatar-grid">
      <div *ngFor="let url of catalogo()" class="avatar-item" (click)="seleccionarAvatarYCrear(url)">
        <img [src]="url" alt="Avatar">
      </div>
    </div>
    <button class="btn-cancel" (click)="showAvatarModal.set(false)">Cancelar</button>
  </div>
</div>

<app-login *ngIf="showLoginModal()" (close)="showLoginModal.set(false)"></app-login>
