<div class="modal-overlay" (click)="onClose()">
  <div class="modal-content" (click)="$event.stopPropagation()" style="max-width: 500px;">
    <button class="close-btn" (click)="onClose()">&times;</button>
    
    <h2>Gestionar Administradores</h2>
    
    <div *ngIf="error" class="error-msg">{{ error }}</div>
    <div *ngIf="success" style="color: #10b981; font-size: 0.9rem; margin-bottom: 1rem; text-align: center;">{{ success }}</div>

    <div class="admin-list" style="margin-top: 1rem;">
      <table style="width: 100%; border-collapse: collapse; color: #fff;">
        <thead>
          <tr style="border-bottom: 1px solid #3f3f46; text-align: left;">
            <th style="padding: 0.8rem;">Usuario</th>
            <th style="padding: 0.8rem; text-align: right;">Acciones</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let admin of admins" style="border-bottom: 1px solid #27272a;">
            <td style="padding: 0.8rem;">
                {{ admin.username }}
                <span *ngIf="admin.id === authService.userId()" style="font-size: 0.75rem; color: #6366f1; font-weight: bold; margin-left: 5px;">(Tú)</span>
            </td>
            <td style="padding: 0.8rem; text-align: right; display: flex; gap: 0.5rem; justify-content: flex-end;">
              <button 
                class="btn-edit" 
                style="background: #3b82f6; border: none; color: #fff; padding: 0.4rem 0.8rem; border-radius: 4px; cursor: pointer; font-size: 0.85rem;"
                [disabled]="loading"
                (click)="cambiarPassword(admin.id)"
              >
                Clave
              </button>
              <button 
                class="btn-delete" 
                style="background: #ef4444; border: none; color: #fff; padding: 0.4rem 0.8rem; border-radius: 4px; cursor: pointer; font-size: 0.85rem;"
                [disabled]="loading || admin.id === authService.userId()"
                [style.opacity]="admin.id === authService.userId() ? '0.3' : '1'"
                (click)="eliminarAdmin(admin.id)"
              >
                Eliminar
              </button>
            </td>
          </tr>
        </tbody>
      </table>
      
      <p *ngIf="admins.length === 0 && !loading" style="text-align: center; color: #a1a1aa; margin-top: 1.5rem;">
        No hay otros administradores.
      </p>

      <div *ngIf="loading" style="text-align: center; margin-top: 1.5rem;">
        Cargando administradores...
      </div>
    </div>
  </div>
</div>
