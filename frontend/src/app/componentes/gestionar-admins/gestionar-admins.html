<div class="modal-overlay" (click)="onClose()">
  <div class="modal-content" (click)="$event.stopPropagation()" style="max-width: 500px;">
    <button class="close-btn" (click)="onClose()">&times;</button>
    
    <h2>Gestionar Administradores</h2>
    
    <div *ngIf="error" class="error-msg">{{ error }}</div>
    <div *ngIf="success" style="color: #10b981; font-size: 0.9rem; margin-bottom: 1rem; text-align: center;">{{ success }}</div>

    <div class="admin-list" style="margin-top: 1rem;">
      <table style="width: 100%; border-collapse: collapse; color: #fff;">
        <thead>
          <tr style="border-bottom: 2px solid #3b82f6; text-align: left;">
            <th style="padding: 1rem;">Usuario</th>
            <th style="padding: 1rem;">Nueva Clave (Enter para guardar)</th>
            <th style="padding: 1rem; text-align: right;">Acción</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let admin of admins" style="border-bottom: 1px solid #27272a;">
            <td style="padding: 1rem;">
                {{ admin.username }}
                <span *ngIf="admin.id === authService.userId()" style="font-size: 0.75rem; color: #3b82f6; font-weight: bold; margin-left: 5px;">(Tú)</span>
            </td>
            <td style="padding: 0.5rem 1rem;">
              <input 
                #passInput
                type="password" 
                placeholder="Nueva clave..."
                style="background: #000; border: 1px solid #334155; color: #fff; padding: 0.5rem; border-radius: 8px; width: 100%; outline: none;"
                (keyup.enter)="cambiarPasswordDirecta(admin.id, passInput.value); passInput.value = ''"
              >
            </td>
            <td style="padding: 1rem; text-align: right;">
              <button 
                class="btn-delete" 
                style="background: #ef4444; border: none; color: #fff; padding: 0.5rem 1rem; border-radius: 8px; cursor: pointer; font-size: 0.85rem; font-weight: 700;"
                [disabled]="loading || admin.id === authService.userId()"
                [style.opacity]="admin.id === authService.userId() ? '0.3' : '1'"
                (click)="eliminarAdmin(admin.id)"
              >
                Eliminar
              </button>
            </td>
          </tr>
        </tbody>
      </table>
      
      <p *ngIf="admins.length === 0 && !loading" style="text-align: center; color: #a1a1aa; margin-top: 1.5rem;">
        No hay otros administradores.
      </p>
    </div>
  </div>
</div>
