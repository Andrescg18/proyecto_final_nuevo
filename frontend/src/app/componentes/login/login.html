<div class="modal-overlay" (click)="onClose()">
  <div class="modal-content" (click)="$event.stopPropagation()">
    <button class="close-btn" (click)="onClose()">&times;</button>
    <h2>Iniciar Sesión (Admin)</h2>
    
    <div class="form-group">
      <label>Usuario</label>
      <input type="text" [(ngModel)]="username" placeholder="admin" autofocus />
    </div>
    
    <div class="form-group">
      <label>Contraseña</label>
      <input type="password" [(ngModel)]="password" placeholder="admin123" (keyup.enter)="onLogin()" />
    </div>
    
    <div *ngIf="error" class="error-msg">{{ error }}</div>
    
    <div class="modal-footer">
      <button class="btn-secondary" (click)="onClose()" [disabled]="loading">Cancelar</button>
      <button class="submit-btn" (click)="onLogin()" [disabled]="loading || !username || !password">
        {{ loading ? 'Cargando...' : 'Entrar' }}
      </button>
    </div>
  </div>
</div>
