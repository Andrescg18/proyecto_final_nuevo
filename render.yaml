services:
  # 🌐 Servicio Backend (Node.js)
  - type: web
    name: evidence-management-backend
    env: node
    plan: free
    buildCommand: cd backend && npm install
    startCommand: cd backend && node index.js
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: PORT
        value: 10000
      - key: JWT_SECRET
        generateValue: true
      # Conexión a TiDB Cloud
      - key: DB_HOST
        value: gateway01.us-east-1.prod.aws.tidbcloud.com
      - key: DB_USER
        value: 2vMVrSXioiJYE4q.root
      - key: DB_PASSWORD
        value: kkV43Tcfet5mqqqb
      - key: DB_NAME
        value: test
      - key: DB_PORT
        value: "4000"
      - key: DB_SSL
        value: "true"
      - key: TIDB_CA_PATH
        value: "./isrgrootx1.pem"
      - key: MYSQL_URL
        sync: false

  # 🖥️ Servicio Frontend (Angular - Desactivando Prerender para estabilidad)
  - type: static
    name: evidence-management-frontend
    buildCommand: cd frontend && npm install && npm run build:prod
    publishDir: frontend/dist/proyecto_inicial/browser
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: API_BASE_URL
        value: https://evidence-management-backend.onrender.com
