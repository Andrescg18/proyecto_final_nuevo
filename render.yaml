services:
  # 🌐 Servicio Backend (Node.js)
  - type: web
    name: evidence-management-backend
    env: node
    plan: free
    buildCommand: cd backend && npm install
    startCommand: cd backend && node index.js
    envVars:
      - key: PORT
        value: 10000
      - key: JWT_SECRET
        generateValue: true
      # Conexión a TiDB Cloud
      - key: DB_HOST
        value: gateway01.us-east-1.prod.aws.tidbcloud.com
      - key: DB_USER
        value: 2vMVrSXioiJYE4q.root
      - key: DB_PASSWORD
        value: kkV43Tcfet5mqqqb
      - key: DB_NAME
        value: test
      - key: DB_PORT
        value: "4000"
      - key: DB_SSL
        value: "true"
      - key: TIDB_CA_PATH
        value: "./isrgrootx1.pem"
      - key: MYSQL_URL
        sync: false

  # 🖥️ Servicio Frontend (Angular - Como Servicio Web)
  - type: web
    name: evidence-management-frontend
    env: node
    plan: free
    buildCommand: cd frontend && npm install && npm run build:prod
    startCommand: npx serve -s frontend/dist/proyecto_inicial/browser -p 10000
    envVars:
      - key: API_BASE_URL
        fromService:
          name: evidence-management-backend
          property: url
